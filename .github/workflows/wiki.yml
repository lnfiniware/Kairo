name: Wiki Sync

on:
  push:
    paths:
      - 'docs/wiki/**'
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          path: main

      - name: Sync Wiki
        uses: SwiftDocOrg/github-wiki-action@v1
        with:
          path: main/docs/wiki
        env:
          GH_PERSONAL_ACCESS_TOKEN: ${{ secrets.GH_PAT }}
